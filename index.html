<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أسرة البابا شنودة لإعداد خدام</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --royal-blue: #17255E;
  --royal-blue-2: #223C8C;
  --royal-blue-light: #3A56B0;
  --gold: #C6A15B;
  --gold-bright: #E0C083;
  --gold-dim: #8A6F3A;
  --white: #FFFFFF;
  --off-white: #F7F5EF;
  --dark-gray: #26282E;
  --gray-mid: #6D707A;
  --gray-line: #E2E0D8;
  --fail-red: #A63D40;
  --radius: 10px;
  --shadow: 0 10px 30px rgba(23,37,94,0.10);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--off-white);
  color:var(--dark-gray);
  font-family:'Tajawal',sans-serif;
  min-height:100vh;
}
h1,h2,h3,.brand,.display{
  font-family:'Amiri', serif;
}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
input,select,button,textarea{font-family:inherit;font-size:15px;}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px;}

/* ===== layout shells ===== */
.centered-shell{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:
    radial-gradient(circle at 15% 20%, rgba(198,161,91,0.10), transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(34,60,140,0.15), transparent 45%),
    var(--royal-blue);
}
.auth-card{
  width:100%;
  max-width:440px;
  background:var(--white);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:40px 34px 34px;
  position:relative;
  border:1px solid rgba(198,161,91,0.35);
}
.auth-card::before,.auth-card::after{
  content:"";
  position:absolute;
  width:22px;height:22px;
  border:2px solid var(--gold);
}
.auth-card::before{top:10px;right:10px;border-left:none;border-bottom:none;}
.auth-card::after{bottom:10px;left:10px;border-right:none;border-top:none;}
.brand-block{text-align:center;margin-bottom:26px;}
.brand-block .mark{
  width:56px;height:56px;margin:0 auto 12px;
  border-radius:50%;
  border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  color:var(--royal-blue);
  font-family:'Amiri',serif;font-weight:700;font-size:17px;
}
.brand-block h1{
  font-size:26px;color:var(--royal-blue);margin:0 0 4px;
}
.brand-block p{margin:0;color:var(--gray-mid);font-size:13.5px;letter-spacing:.3px;}

.field{margin-bottom:16px;}
.field label{
  display:block;font-size:13.5px;color:var(--gray-mid);margin-bottom:6px;font-weight:500;
}
.field .req{color:var(--fail-red);}
.field input,.field select{
  width:100%;
  padding:11px 13px;
  border:1.5px solid var(--gray-line);
  border-radius:8px;
  background:var(--off-white);
  color:var(--dark-gray);
  transition:border-color .15s;
}
.field input:focus,.field select:focus{
  border-color:var(--royal-blue-light);
  background:var(--white);
}
.field-row{display:flex;gap:12px;}
.field-row .field{flex:1;}

.photo-upload{
  display:flex;align-items:center;gap:14px;margin-bottom:16px;
}
.photo-preview{
  width:72px;height:72px;border-radius:50%;
  background:var(--off-white);
  border:2px dashed var(--gray-line);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;flex-shrink:0;color:var(--gray-mid);font-size:11px;text-align:center;
}
.photo-preview img{width:100%;height:100%;object-fit:cover;}
.upload-btn{
  border:1.5px solid var(--royal-blue-light);
  background:var(--white);
  color:var(--royal-blue);
  padding:9px 16px;
  border-radius:8px;
  font-weight:600;font-size:13.5px;
}
.upload-btn:hover{background:var(--royal-blue);color:var(--white);}

.btn-primary{
  width:100%;
  padding:13px;
  border:none;
  border-radius:8px;
  background:var(--royal-blue);
  color:var(--white);
  font-weight:700;font-size:15.5px;
  letter-spacing:.3px;
  transition:background .15s;
}
.btn-primary:hover{background:var(--royal-blue-2);}
.btn-primary:disabled{background:var(--gray-line);color:var(--gray-mid);cursor:not-allowed;}

.btn-gold{
  border:none;border-radius:8px;
  background:var(--gold);color:var(--royal-blue);
  font-weight:700;padding:10px 18px;font-size:14px;
}
.btn-gold:hover{background:var(--gold-bright);}
.btn-gold:disabled{background:var(--gray-line);color:var(--gray-mid);}

.btn-outline{
  border:1.5px solid var(--gray-line);
  background:var(--white);
  color:var(--dark-gray);
  border-radius:8px;padding:9px 14px;font-size:13.5px;font-weight:500;
}
.btn-outline:hover{border-color:var(--royal-blue-light);color:var(--royal-blue);}

.btn-danger{
  border:1.5px solid var(--fail-red);
  background:var(--white);color:var(--fail-red);
  border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;
}
.btn-danger:hover{background:var(--fail-red);color:var(--white);}

.switch-line{text-align:center;margin-top:18px;font-size:13.5px;color:var(--gray-mid);}
.switch-line button{background:none;border:none;color:var(--royal-blue-light);font-weight:700;padding:0;}
.switch-line button:hover{color:var(--gold-dim);text-decoration:underline;}

.error-box{
  background:#FBEDED;border:1px solid var(--fail-red);color:var(--fail-red);
  padding:10px 12px;border-radius:8px;font-size:13.5px;margin-bottom:14px;
}
.info-box{
  background:#EEF1FB;border:1px solid var(--royal-blue-light);color:var(--royal-blue-2);
  padding:10px 12px;border-radius:8px;font-size:13.5px;margin-bottom:14px;
}

/* ===== dashboard shell ===== */
.dash-shell{display:flex;min-height:100vh;}
.sidebar{
  width:230px;flex-shrink:0;
  background:var(--royal-blue);
  color:var(--white);
  display:flex;flex-direction:column;
  padding:22px 0;
}
.sidebar .brand-block{color:var(--white);margin-bottom:20px;padding:0 20px;text-align:right;}
.sidebar .brand-block .mark{border-color:var(--gold);color:var(--gold);margin:0 0 10px;}
.sidebar .brand-block h1{color:var(--white);font-size:18px;}
.sidebar .brand-block p{color:rgba(255,255,255,0.55);}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:12px 22px;
  color:rgba(255,255,255,0.75);
  font-size:14.5px;font-weight:500;
  border-right:3px solid transparent;
  cursor:pointer;
}
.nav-item:hover{background:rgba(255,255,255,0.06);color:var(--white);}
.nav-item.active{
  background:rgba(198,161,91,0.14);
  color:var(--gold-bright);
  border-right-color:var(--gold);
  font-weight:700;
}
.sidebar-footer{margin-top:auto;padding:14px 20px 4px;border-top:1px solid rgba(255,255,255,0.12);}
.who{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.who img{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1.5px solid var(--gold);}
.who .n{font-size:13.5px;font-weight:700;color:var(--white);}
.who .r{font-size:11.5px;color:rgba(255,255,255,0.55);}
.logout-btn{
  width:100%;background:none;border:1px solid rgba(255,255,255,0.25);
  color:rgba(255,255,255,0.8);padding:8px;border-radius:7px;font-size:13px;
}
.logout-btn:hover{border-color:var(--gold);color:var(--gold);}

.main{flex:1;padding:30px 34px;max-width:1200px;}
.page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.page-head h2{color:var(--royal-blue);font-size:24px;margin:0 0 4px;}
.page-head .sub{color:var(--gray-mid);font-size:13.5px;margin:0;}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:28px;}

.quick-actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;}
.quick-action-btn{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  background:var(--off-white);
  border:1.5px solid var(--gray-line);
  border-radius:var(--radius);
  padding:20px 14px;
  transition:border-color .15s, background .15s, transform .1s;
}
.quick-action-btn:hover{border-color:var(--gold);background:rgba(198,161,91,0.08);transform:translateY(-2px);}
.quick-action-btn .qa-icon{font-size:28px;}
.quick-action-btn .qa-label{font-size:14px;font-weight:700;color:var(--royal-blue);}
.stat-card{
  background:var(--white);border-radius:var(--radius);padding:18px 20px;
  border:1px solid var(--gray-line);box-shadow:var(--shadow);
}
.stat-card .v{font-family:'Amiri',serif;font-size:30px;color:var(--royal-blue);font-weight:700;}
.stat-card .l{font-size:12.5px;color:var(--gray-mid);margin-top:2px;}
.stat-card.gold-accent{border-top:3px solid var(--gold);}

.panel{
  background:var(--white);border-radius:var(--radius);
  border:1px solid var(--gray-line);box-shadow:var(--shadow);
  padding:22px 24px;margin-bottom:22px;
}
.panel h3{color:var(--royal-blue);font-size:16.5px;margin:0 0 16px;padding-bottom:10px;border-bottom:1px solid var(--gray-line);}

.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.toolbar input[type=text],.toolbar select{
  padding:9px 12px;border:1.5px solid var(--gray-line);border-radius:8px;background:var(--off-white);font-size:13.5px;
}
.toolbar .grow{flex:1;min-width:160px;}

table{width:100%;border-collapse:collapse;font-size:13.8px;}
th{
  text-align:right;color:var(--gray-mid);font-weight:700;font-size:12.5px;
  text-transform:uppercase;letter-spacing:.3px;
  padding:10px 10px;border-bottom:2px solid var(--gray-line);
}
td{padding:11px 10px;border-bottom:1px solid var(--gray-line);vertical-align:middle;}
tr:hover td{background:rgba(34,60,140,0.03);}
.row-photo{width:34px;height:34px;border-radius:50%;object-fit:cover;border:1.5px solid var(--gray-line);}

.badge{display:inline-block;padding:4px 11px;border-radius:20px;font-size:12px;font-weight:700;}
.badge.pass{background:rgba(198,161,91,0.18);color:var(--gold-dim);}
.badge.fail{background:rgba(166,61,64,0.12);color:var(--fail-red);}
.badge.present{background:rgba(34,60,140,0.10);color:var(--royal-blue-2);}
.badge.absent{background:rgba(166,61,64,0.12);color:var(--fail-red);}
.badge.role-admin{background:var(--royal-blue);color:var(--gold-bright);}
.badge.role-student{background:var(--gray-line);color:var(--gray-mid);}

.score-input{width:80px;padding:7px 8px;border:1.5px solid var(--gray-line);border-radius:6px;text-align:center;}
.mini-btn{border:none;background:var(--royal-blue);color:var(--white);border-radius:6px;padding:7px 12px;font-size:12.5px;font-weight:600;}
.mini-btn:hover{background:var(--royal-blue-2);}
.mini-btn.saved{background:var(--gold);color:var(--royal-blue);}

.att-toggle{display:flex;gap:6px;}
.att-btn{border:1.5px solid var(--gray-line);background:var(--white);border-radius:6px;padding:6px 12px;font-size:12.5px;font-weight:600;color:var(--gray-mid);}
.att-btn.present.on{background:var(--royal-blue);border-color:var(--royal-blue);color:var(--white);}
.att-btn.absent.on{background:var(--fail-red);border-color:var(--fail-red);color:var(--white);}

.progress-bar{height:9px;background:var(--gray-line);border-radius:6px;overflow:hidden;}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--royal-blue),var(--gold));}

.empty-state{text-align:center;color:var(--gray-mid);padding:36px 10px;font-size:14px;}

.two-col{display:grid;grid-template-columns:1.1fr 1.6fr;gap:20px;}
@media (max-width:900px){.two-col{grid-template-columns:1fr;}}

.profile-card{display:flex;gap:18px;align-items:center;}
.profile-card img{width:84px;height:84px;border-radius:50%;object-fit:cover;border:3px solid var(--gold);}
.profile-card .name{font-family:'Amiri',serif;font-size:20px;color:var(--royal-blue);margin:0 0 4px;}
.profile-card .meta{font-size:13px;color:var(--gray-mid);line-height:1.9;}

.loader{
  width:34px;height:34px;border-radius:50%;
  border:3px solid var(--gray-line);border-top-color:var(--royal-blue);
  animation:spin .8s linear infinite;margin:40px auto;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* New styles for sub tabs, notes, and edit modal */
.sub-tabs { display: flex; gap: 15px; border-bottom: 2px solid var(--gray-line); margin-bottom: 20px; }
.sub-tab { padding: 10px 15px; cursor: pointer; font-weight: 700; color: var(--gray-mid); border-bottom: 3px solid transparent; margin-bottom: -2px; }
.sub-tab.active { color: var(--royal-blue); border-bottom-color: var(--gold); }
.note-input { width: 150px; padding: 7px 10px; border: 1.5px solid var(--gray-line); border-radius: 6px; font-size: 12.5px; background: var(--off-white); }
.note-input:focus { background: var(--white); border-color: var(--royal-blue-light); }

.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(23, 37, 94, 0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.modal-content { background: var(--white); width: 100%; max-width: 500px; border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); max-height: 90vh; overflow-y: auto; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

/* mobile sidebar */
.mobile-topbar{display:none;}
@media (max-width:820px){
  .dash-shell{flex-direction:column;}
  .sidebar{
    width:100%;flex-direction:row;flex-wrap:wrap;align-items:center;
    padding:12px 14px;position:relative;
  }
  .sidebar .brand-block{display:none;}
  .nav-item{padding:8px 12px;border-right:none;border-radius:6px;}
  .nav-item.active{border-right:none;background:rgba(198,161,91,0.22);}
  .sidebar-footer{margin:0 0 0 auto;padding:0;border:none;display:flex;align-items:center;gap:10px;}
  .who{margin:0;}
  .who .r{display:none;}
  .main{padding:20px 16px;}
  .field-row{flex-direction:column;gap:0;}
}

@media print{
  .sidebar,.no-print{display:none !important;}
  .main{padding:0;max-width:100%;}
  body{background:var(--white);}
  .panel{box-shadow:none;border:1px solid #ccc;}
}
</style>
</head>
<body>
<div id="app"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://egbvfjfanpdrptqmtixc.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_EWvmf67VkDZu0yEuGkN79g_snpRMPbN';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const app = document.getElementById('app');

let state = {
  view: 'loading',
  session: null,
  profile: null,
  adminTab: 'overview',
  studentTab: 'profile',
  error: '',
  loading: false,
};

function normalizeName(n){
  return (n || '').trim().replace(/\s+/g, ' ');
}

function fmtDate(d){
  if(!d) return '—';
  try{ return new Date(d).toLocaleDateString('ar-EG',{year:'numeric',month:'short',day:'numeric'}); }
  catch(e){ return d; }
}

function escapeHtml(s){
  return (s ?? '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ===================== تحميل الجلسة الحالية ===================== */
async function boot(){
  const { data: { session } } = await supabase.auth.getSession();
  if(session){
    state.session = session;
    await loadProfile();
  }else{
    state.view = 'login';
  }
  render();
}

async function loadProfile(){
  const { data, error } = await supabase
    .from('users')
    .select('*')
    .eq('id', state.session.user.id)
    .single();
  if(error || !data){
    state.view = 'login';
    state.error = 'تعذر تحميل بيانات الحساب، حاول تسجيل الدخول تاني';
    await supabase.auth.signOut();
    return;
  }
  state.profile = data;
  state.view = data.role === 'admin' ? 'admin' : 'student';
}

/* ===================== تسجيل الدخول / الخروج ===================== */
async function doLogin(email, password, btn){
  state.error = '';
  if(!email || !password){ state.error='اكتب البريد الإلكتروني وكلمة المرور'; render(); return; }
  btn.disabled = true; btn.textContent = 'جاري الدخول...';
  
  const { data, error } = await supabase.auth.signInWithPassword({ email: email.trim(), password });
  if(error){
    state.error = 'البريد الإلكتروني أو كلمة المرور غلط';
    render();
    return;
  }
  state.session = data.session;
  await loadProfile();
  render();
}

async function doLogout(){
  await supabase.auth.signOut();
  state = { view:'login', session:null, profile:null, adminTab:'overview', studentTab:'profile', error:'', loading:false };
  render();
}

/* ===================== التسجيل ===================== */
async function doSignup(formEl, btn){
  try {
    state.error = '';
    const fd = new FormData(formEl);
    const password = fd.get('password')?.trim();
    const fullName = normalizeName(fd.get('full_name'));
    const phone = fd.get('phone')?.trim();
    const email = fd.get('email')?.trim();
    const birthDate = fd.get('birth_date');
    const studyYear = fd.get('study_year');
    const photoFile = document.getElementById('signup-photo-input').files[0];

    if(!password || !fullName || !phone || !email || !birthDate || !studyYear){
      state.error = 'من فضلك املأ كل الحقول المطلوبة';
      render(); return;
    }
    if(!photoFile){
      state.error = 'الصورة الشخصية إجبارية لإنشاء الحساب';
      render(); return;
    }

    btn.disabled = true; btn.textContent = 'جاري إنشاء الحساب...';

    // 1. إنشاء الحساب في Auth
    const { data: signData, error: signErr } = await supabase.auth.signUp({ email, password });
    if(signErr){
      console.error('Signup auth error:', signErr);
      state.error = 'البريد مستخدم أو هناك خطأ في التسجيل، جرب تاني';
      render(); return;
    }
    const userId = signData.user.id;

    // لو تفعيل الإيميل مفعّل في إعدادات Supabase، مفيش session دلوقتي
    // وأي محاولة رفع/حفظ بيانات هترفض بسبب RLS. لازم تتأكد إن Confirm Email متقفل
    // من Supabase Dashboard > Authentication > Providers، أو تتعامل مع الحالة دي هنا.
    if(!signData.session){
      state.error = 'تم إنشاء الحساب، من فضلك أكّد بريدك الإلكتروني ثم سجّل الدخول';
      render(); return;
    }

    // 2. رفع الصورة
    const ext = photoFile.name.split('.').pop();
    const path = `${userId}/avatar.${ext}`;
    const { error: upErr } = await supabase.storage.from('photos').upload(path, photoFile, { upsert:true });
    if(upErr){
      console.error('Photo upload error:', upErr);
      state.error = 'حصل خطأ في رفع الصورة، جرب تاني';
      render(); return;
    }
    const { data: pub } = supabase.storage.from('photos').getPublicUrl(path);

    // 3. حفظ البيانات في جدول users
    const { error: insErr } = await supabase.from('users').insert({
      id: userId, full_name: fullName, phone: phone,
      contact_email: email, birth_date: birthDate,
      study_year: studyYear, photo_url: pub.publicUrl, role: 'student',
    });
    if(insErr){
      console.error('Profile insert error:', insErr);
      state.error = 'حصل خطأ في حفظ البيانات، جرب تاني';
      render(); return;
    }

    localStorage.removeItem('signupDraft');
    const { data: { session } } = await supabase.auth.getSession();
    state.session = session;
    await loadProfile();
    render();

  } catch(e) {
    console.error('Unexpected signup error:', e);
    state.error = 'حدث خطأ غير متوقع، جرب تاني';
    render();
  }
}

/* ===================== أدوات جلب البيانات ===================== */
async function fetchAllStudents(){
  const { data } = await supabase.from('users').select('*').eq('role','student').order('full_name');
  return data || [];
}
async function fetchAllUsers(){
  const { data } = await supabase.from('users').select('*').order('full_name');
  return data || [];
}
async function fetchExams(){
  const { data } = await supabase.from('exams').select('*').order('exam_date',{ascending:false});
  return data || [];
}
async function fetchSessions(){
  const { data } = await supabase.from('attendance_sessions').select('*').order('session_date',{ascending:false});
  return data || [];
}

/* ===================== الرندر الرئيسي للواجهات ===================== */
function render(){
  if(state.view === 'loading'){
    app.innerHTML = `<div class="centered-shell"><div class="loader"></div></div>`;
    return;
  }
  if(state.view === 'login') return renderLogin();
  if(state.view === 'signup') return renderSignup();
  if(state.view === 'student') return renderStudent();
  if(state.view === 'admin') return renderAdmin();
}

/* ===================== شاشة إنشاء حساب ===================== */
function renderSignup(){
  app.innerHTML = `
  <div class="centered-shell">
    <div class="auth-card" style="max-width:480px;">
      <div class="brand-block">
        <h1>إنشاء حساب</h1>
        <p>بيانات الخادم / الدارس</p>

      <form id="signup-form">

          <div class="photo-preview" id="photo-preview">لسه مفيش صورة</div>
          <div>
            <input type="file" accept="image/*" id="signup-photo-input" style="display:none">
            <button type="button" class="upload-btn" id="photo-trigger">رفع صورة شخصية *</button>
          </div>
        </div>
        <div class="field">
          <label>الاسم الكامل <span class="req">*</span></label>
          <input type="text" name="full_name" required>
        </div>
        <div class="field">
          <label>البريد الإلكتروني <span class="req">*</span></label>
          <input type="email" name="email" required dir="ltr" style="text-align:left;">
        </div>
        <div class="field">
          <label>كلمة المرور <span class="req">*</span></label>
          <input type="password" name="password" minlength="6" required dir="ltr" style="text-align:left;">
        </div>
        <div class="field-row">
          <div class="field">
            <label>رقم الموبايل <span class="req">*</span></label>
            <input type="tel" name="phone" required>
          </div>
          <div class="field">
            <label>تاريخ الميلاد <span class="req">*</span></label>
            <input type="date" name="birth_date" required>
          </div>
        </div>
        <div class="field">
          <label>السنة الدراسية <span class="req">*</span></label>
          <select name="study_year" required>
            <option value="" disabled selected>اختار السنة</option>
            <option value="الصف الأول">الصف الأول</option>
            <option value="الصف الثاني">الصف الثاني</option>
          </select>
        </div>
        <button type="submit" class="btn-primary" id="signup-btn">إنشاء الحساب</button>
      </form>
      <div class="switch-line">عندك حساب بالفعل؟ <button id="go-login">تسجيل الدخول</button></div>
    </div>
  </div>`;

  const form = document.getElementById('signup-form');

  // استرجاع المسودة التلقائية
  const draft = JSON.parse(localStorage.getItem('signupDraft') || '{}');
  Object.keys(draft).forEach(key => {
    const input = form.querySelector(`[name="${key}"]`);
    if(input) input.value = draft[key];
  });

  // حفظ مسودة
  form.addEventListener('input', (e) => {
    if(e.target.name === 'password' || e.target.type === 'file') return;
    const fd = new FormData(form);
    const currentData = Object.fromEntries(fd.entries());
    delete currentData.password;
    localStorage.setItem('signupDraft', JSON.stringify(currentData));
  });

  document.getElementById('go-login').addEventListener('click', () => { state.view='login'; state.error=''; render(); });
  document.getElementById('photo-trigger').addEventListener('click', () => document.getElementById('signup-photo-input').click());
  document.getElementById('signup-photo-input').addEventListener('change', (e) => {

    const reader = new FileReader();
    reader.onload = () => { document.getElementById('photo-preview').innerHTML = `<img src="${reader.result}">`; };
    reader.readAsDataURL(f);
  });
  document.getElementById('signup-form').addEventListener('submit', (e) => {
    e.preventDefault();
    doSignup(e.target, document.getElementById('signup-btn'));
  });
}

async function renderStudentScores(main){
  const { data: scores } = await supabase
    .from('scores')
    .select('score, exam_id, exams(name, subject, exam_date, max_score, passing_score)')
    .eq('user_id', state.profile.id);

  const rows = (scores || []).filter(s => s.exams).sort((a,b) => new Date(b.exams.exam_date) - new Date(a.exams.exam_date));

  main.innerHTML = `
  <div class="page-head no-print">
    <div><h2>درجاتي</h2><p class="sub">نتيجة امتحانات مستواك بمجرد رصدها</p></div>
    <button class="btn-outline" id="print-btn">🖨 طباعة / تصدير</button>
  </div>
  <div class="panel">
    ${rows.length === 0 ? `<div class="empty-state">لسه مفيش درجات مرصودة ليك</div>` : `
    <table>
      <thead><tr><th>الامتحان</th><th>المادة</th><th>التاريخ</th><th>الدرجة</th><th>النسبة</th><th>الحالة</th></tr></thead>
      <tbody>
        ${rows.map(r => {
          const pct = Math.round((r.score / r.exams.max_score) * 100);
          const passed = pct >= (r.exams.passing_score || 50);
          return `<tr>
            <td>${escapeHtml(r.exams.name)}</td>
            <td>${escapeHtml(r.exams.subject || '—')}</td>
            <td>${fmtDate(r.exams.exam_date)}</td>

        }).join('')}
      </tbody>
    </table>`}
  </div>`;

  if(printBtn) printBtn.addEventListener('click', () => window.print());
}

        <div class="field"><label>المادة</label><input type="text" name="subject"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>الصف المستهدف *</label>
          <select name="study_year" required>
            <option value="الصف الأول">الصف الأول</option>
            <option value="الصف الثاني">الصف الثاني</option>
            <option value="عام">عام (لكل الدارسين)</option>
          </select>
        </div>
        <div class="field"><label>تاريخ الامتحان *</label><input type="date" name="exam_date" required></div>
      </div>
      <div class="field-row">
        <div class="field"><label>الدرجة النهائية *</label><input type="number" name="max_score" value="100" min="1" required></div>
        <div class="field"><label>درجة النجاح (%) *</label><input type="number" name="passing_score" value="50" min="1" max="100" required></div>
      </div>
      <button type="submit" class="btn-primary" id="exam-submit" style="width:auto;padding:11px 26px;">إضافة الامتحان</button>
    </form>
  </div>
  <div class="panel">
    <h3>كل الامتحانات والمواد المضافة (${exams.length})</h3>
    ${exams.length===0 ? `<div class="empty-state">لسه مفيش امتحانات مضافة</div>` : `
    <table><thead><tr><th>الامتحان</th><th>المادة</th><th>الصف المستهدف</th><th>التاريخ</th><th>الدرجة</th><th>إجراءات</th></tr></thead>
    <tbody>${exams.map(e=>`<tr>
      <td>${escapeHtml(e.name)}</td><td>${escapeHtml(e.subject||'—')}</td>
      <td><span class="badge present">${escapeHtml(e.study_year)}</span></td>
      <td>${fmtDate(e.exam_date)}</td><td>${e.max_score}</td>
      <td><button class="btn-danger" data-del-exam="${e.id}">حذف</button></td>
    </tr>`).join('')}</tbody></table>`}
  </div>`;

  document.getElementById('exam-form').addEventListener('submit', async (e) => {
    e.preventDefault(); state.error='';
    const fd = new FormData(e.target);
    const btn = document.getElementById('exam-submit');
    btn.disabled = true; btn.textContent = 'جاري الإضافة...';
    const { error } = await supabase.from('exams').insert({
      name: fd.get('name'), subject: fd.get('subject') || null,
      exam_date: fd.get('exam_date'), max_score: Number(fd.get('max_score')),
      passing_score: Number(fd.get('passing_score')), study_year: fd.get('study_year'),
      created_by: state.profile.id,
    });
    if(error){ state.error = 'حصل خطأ: ' + error.message; }
    renderAdminExams(main);
  });

  main.querySelectorAll('[data-del-exam]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if(!confirm('متأكد من حذف الامتحان ده؟ هيتحذف معاه كل الدرجات المربوطة بيه')) return;
      await supabase.from('exams').delete().eq('id', btn.dataset.delExam);
      renderAdminExams(main);
    });
  });
}

/* ===================== رصد الدرجات (حسب صف المادة) ===================== */
async function renderAdminScores(main, filterText='', selectedExamId=''){
  const exams = await fetchExams();
  if(!selectedExamId && exams.length) selectedExamId = exams[0].id;

  main.innerHTML = `
  <div class="page-head"><div><h2>رصد الدرجات</h2><p class="sub">رصد وتعديل درجات الدارسين للمستوى المعني بالامتحان</p></div></div>
  <div class="panel">
    ${exams.length===0 ? `<div class="empty-state">لازم تضيف مادة أو امتحان الأول من صفحة الامتحانات</div>` : `
    <div class="toolbar">
      <select id="exam-select">${exams.map(e=>`<option value="${e.id}" ${e.id===selectedExamId?'selected':''}>${escapeHtml(e.name)} (${escapeHtml(e.study_year)})</option>`).join('')}</select>
      <input type="text" class="grow" id="search-input" placeholder="بحث باسم الدارس..." value="${escapeHtml(filterText)}">
    </div>
    <div id="scores-table-wrap"><div class="loader"></div></div>`}
  </div>`;

  if(exams.length===0) return;

  document.getElementById('exam-select').addEventListener('change', (e) => {
    renderAdminScores(main, document.getElementById('search-input').value, e.target.value);
  });
  let searchTimer;
  document.getElementById('search-input').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => renderScoresTable(selectedExamId, e.target.value), 250);
  });

  await renderScoresTable(selectedExamId, filterText);
}

async function renderScoresTable(examId, filterText){
  const wrap = document.getElementById('scores-table-wrap');
  const exam = (await fetchExams()).find(e => e.id === examId);
  const students = await fetchAllStudents();
  const { data: existing } = await supabase.from('scores').select('*').eq('exam_id', examId);
  const scoreMap = {};
  (existing||[]).forEach(s => scoreMap[s.user_id] = s);

  // فلترة الطلاب بناء على الصف المخصص للمادة
  const filtered = students.filter(s =>
    (exam.study_year === 'عام' || s.study_year === exam.study_year) &&
    (!filterText || s.full_name.toLowerCase().includes(filterText.toLowerCase()))
  );

  wrap.innerHTML = filtered.length===0 ? `<div class="empty-state">مفيش دارسين في هذا الصف مطابقين للبحث</div>` : `
  <table>
    <thead><tr><th>الدارس</th><th>الصف الدراسي</th><th>الدرجة (من ${exam.max_score})</th><th>الحالة</th><th>إجراء</th></tr></thead>
    <tbody>${filtered.map(s => {
      const existingScore = scoreMap[s.id];
      const pct = existingScore ? Math.round((existingScore.score/exam.max_score)*100) : null;
      const passed = pct !== null ? pct >= exam.passing_score : null;
      return `<tr>
        <td style="display:flex;align-items:center;gap:8px;"><img class="row-photo" src="${s.photo_url}"><span>${escapeHtml(s.full_name)}</span></td>
        <td>${escapeHtml(s.study_year)}</td>
        <td><input type="number" class="score-input" min="0" max="${exam.max_score}" data-user="${s.id}" value="${existingScore ? existingScore.score : ''}"></td>
        <td>${pct===null ? '<span style="color:var(--gray-mid);font-size:12.5px;">لم ترصد بعد</span>' : `<span class="badge ${passed?'pass':'fail'}">${pct}%</span>`}</td>
        <td><button class="mini-btn" data-save="${s.id}">حفظ</button></td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;

  wrap.querySelectorAll('[data-save]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const userId = btn.dataset.save;
      const input = wrap.querySelector(`.score-input[data-user="${userId}"]`);
      const val = Number(input.value);
      if(input.value === '' || isNaN(val)){ alert('اكتب درجة صحيحة مئوية'); return; }
      btn.disabled = true; btn.textContent = '...';
      
      await supabase.from('scores').upsert({
        exam_id: examId, user_id: userId, score: val, updated_at: new Date().toISOString()
      }, { onConflict: 'exam_id,user_id' });
      
      btn.textContent = 'تم ✓'; btn.classList.add('saved');
      setTimeout(() => renderScoresTable(examId, document.getElementById('search-input')?.value || ''), 500);
    });
  });
}

  <div class="page-head"><div><h2>سجلات الحضور واللقاءات</h2><p class="sub">تسجيل غياب وحضور الخدام وإضافة ملاحظات التخلف أو المواعيد</p></div></div>
  <div class="panel">
    <h3>إنشاء لقاء جديد</h3>
    <form id="session-form">
      <div class="field-row">
        <div class="field"><label>اسم اللقاء *</label><input type="text" name="name" required></div>
        <div class="field"><label>التاريخ *</label><input type="date" name="session_date" required></div>
      </div>
      <button type="submit" class="btn-primary" id="session-submit" style="width:auto;padding:11px 26px;">إضافة اللقاء</button>
    </form>
  </div>
  <div class="panel">
    <h3>دفتر تسجيل الحضور</h3>
    ${sessions.length===0 ? `<div class="empty-state">لازم تضيف لقاء الأول علشان تحضر فيه</div>` : `
    <div class="toolbar" style="margin-bottom:15px;">
      <select id="session-select">${sessions.map(s=>`<option value="${s.id}" ${s.id===selectedSessionId?'selected':''}>${escapeHtml(s.name)} — ${fmtDate(s.session_date)}</option>`).join('')}</select>
    </div>
    <div id="attendance-table-wrap"><div class="loader"></div></div>`}
  </div>`;

  document.getElementById('session-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const btn = document.getElementById('session-submit');
    btn.disabled = true; btn.textContent='جاري الإضافة...';
    await supabase.from('attendance_sessions').insert({

  if(sessions.length===0) return;
  document.getElementById('session-select').addEventListener('change', (e) => renderAttendanceTable(e.target.value));

async function renderAttendanceTable(sessionId, activeYear = 'الصف الأول'){
  const wrap = document.getElementById('attendance-table-wrap');
  const students = await fetchAllStudents();
  const { data: existing } = await supabase.from('attendance_records').select('*').eq('session_id', sessionId);
  const map = {};
  (existing||[]).forEach(r => map[r.user_id] = r);

  const filteredStudents = students.filter(s => s.study_year === activeYear);

  wrap.innerHTML = `
  <div class="sub-tabs">
    <div class="sub-tab ${activeYear==='الصف الأول'?'active':''}" data-year="الصف الأول">الصف الأول (${students.filter(s=>s.study_year==='الصف الأول').length})</div>
    <div class="sub-tab ${activeYear==='الصف الثاني'?'active':''}" data-year="الصف الثاني">الصف الثاني (${students.filter(s=>s.study_year==='الصف الثاني').length})</div>
  </div>
  ${filteredStudents.length===0 ? `<div class="empty-state">مفيش دارسين مسجلين في ${activeYear} حالياً</div>` : `
  <table>
    <thead><tr><th>الدارس</th><th>الحالة العامة</th><th>ملاحظات (الوقت / التأخير..)</th></tr></thead>
    <tbody>${filteredStudents.map(s => {
      const rec = map[s.id] || {};
      return `<tr>
        <td style="display:flex;align-items:center;gap:8px;"><img class="row-photo" src="${s.photo_url}"><span>${escapeHtml(s.full_name)}</span></td>
        <td>
          <div class="att-toggle">
            <button class="att-btn present ${rec.status==='present'?'on':''}" data-att="${s.id}" data-status="present">حاضر</button>
            <button class="att-btn absent ${rec.status==='absent'?'on':''}" data-att="${s.id}" data-status="absent">غايب</button>
          </div>
        </td>
        <td><input type="text" class="note-input" placeholder="مثال: متأخر 15 دقيقة" data-note="${s.id}" value="${escapeHtml(rec.notes||'')}"></td>
      </tr>`;
    }).join('')}</tbody>
  </table>`}`;

  wrap.querySelectorAll('.sub-tab').forEach(tab => {
    tab.addEventListener('click', () => renderAttendanceTable(sessionId, tab.dataset.year));
  });

  wrap.querySelectorAll('[data-att]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const userId = btn.dataset.att; const status = btn.dataset.status;
      const noteInput = wrap.querySelector(`.note-input[data-note="${userId}"]`);
      await supabase.from('attendance_records').upsert({
        session_id: sessionId, user_id: userId, status, notes: noteInput.value
      }, { onConflict: 'session_id,user_id' });
      renderAttendanceTable(sessionId, activeYear);
    });
  });

  wrap.querySelectorAll('.note-input').forEach(input => {
    input.addEventListener('change', async () => {
      const userId = input.dataset.note;
      const rec = map[userId] || {};
      await supabase.from('attendance_records').upsert({
        session_id: sessionId, user_id: userId, notes: input.value, status: rec.status || 'absent'
      }, { onConflict: 'session_id,user_id' });
    });
  });
}

/* ===================== عرض وتعديل بيانات الدارس بالكامل ===================== */
async function renderAdminStudents(main, filterText='', activeYear='الكل'){
  const students = await fetchAllUsers();
  
  const filtered = students.filter(s => 
    (activeYear === 'الكل' || s.study_year === activeYear) &&
    (!filterText || s.full_name.toLowerCase().includes(filterText.toLowerCase()))
  );

  main.innerHTML = `
  <div class="page-head"><div><h2>إدارة حسابات الدارسين</h2><p class="sub">تعديل بيانات الدارس بالكامل وتحديث مستوى صفوفهم</p></div></div>
  <div class="panel">
    <div class="toolbar" style="margin-bottom:20px;">
      <input type="text" class="grow" id="student-search" placeholder="بحث بالاسم..." value="${escapeHtml(filterText)}">
      <select id="year-filter">
        <option value="الكل" ${activeYear==='الكل'?'selected':''}>كل الصفوف الدراسية</option>
        <option value="الصف الأول" ${activeYear==='الصف الأول'?'selected':''}>الصف الأول</option>
        <option value="الصف الثاني" ${activeYear==='الصف الثاني'?'selected':''}>الصف الثاني</option>
      </select>
    </div>
    ${filtered.length===0 ? `<div class="empty-state">مفيش نتائج مطابقة للبحث</div>` : `
    <table>
      <thead><tr><th>الاسم</th><th>الموبايل</th><th>البريد الإلكتروني</th><th>الصف</th><th>الدور</th><th>إجراءات الإشراف</th></tr></thead>
      <tbody>${filtered.map(s => `<tr>
        <td style="display:flex;align-items:center;gap:8px;"><img class="row-photo" src="${s.photo_url}"><span>${escapeHtml(s.full_name)}</span></td>
        <td>${escapeHtml(s.phone||'—')}</td>
        <td>${escapeHtml(s.contact_email||'—')}</td>
        <td><span class="badge present">${escapeHtml(s.study_year||'—')}</span></td>
        <td><span class="badge role-${s.role}">${s.role==='admin'?'أدمن':'دارس'}</span></td>
        <td>
          <div style="display:flex; gap:6px;">
            <button class="btn-outline" data-edit="${s.id}">📝 تعديل البيانات</button>
            <button class="btn-outline" data-toggle-role="${s.id}" data-current-role="${s.role}" ${s.id===state.profile.id?'disabled':''}>تبديل الرتبة</button>
          </div>
        </td>
      </tr>`).join('')}</tbody>
    </table>`}
  </div>`;

  document.getElementById('year-filter').addEventListener('change', (e) => {
    renderAdminStudents(main, document.getElementById('student-search').value, e.target.value);
  });

  let t;
  document.getElementById('student-search').addEventListener('input', (e) => {
    clearTimeout(t);
    t = setTimeout(() => renderAdminStudents(main, e.target.value, document.getElementById('year-filter').value), 250);
  });

  main.querySelectorAll('[data-toggle-role]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const userId = btn.dataset.toggleRole;
      const newRole = btn.dataset.currentRole === 'admin' ? 'student' : 'admin';
      if(!confirm(`متأكد من تحويل صلاحية هذا الحساب؟`)) return;
      const { error } = await supabase.from('users').update({ role: newRole }).eq('id', userId);
      if(error){
        alert('تعذر تغيير الصلاحية: ' + error.message);
        return;
      }
      renderAdminStudents(main, filterText, activeYear);
    });
  });

  main.querySelectorAll('[data-edit]').forEach(btn => {
    btn.addEventListener('click', () => {
      const userToEdit = students.find(u => u.id === btn.dataset.edit);
      openEditStudentModal(userToEdit, () => renderAdminStudents(main, filterText, activeYear));
    });
  });
}

function openEditStudentModal(user, onSaveComplete) {
  const modalHTML = `
  <div class="modal-overlay" id="edit-modal">
    <div class="modal-content">
      <h3 style="margin-top:0; color:var(--royal-blue); border-bottom:1px solid var(--gray-line); padding-bottom:10px;">تعديل بيانات الدارس بالكامل</h3>
      <form id="edit-student-form">
        <div class="field"><label>الاسم الكامل</label><input type="text" name="full_name" value="${escapeHtml(user.full_name)}" required></div>
        <div class="field-row">
          <div class="field"><label>رقم الموبايل</label><input type="tel" name="phone" value="${escapeHtml(user.phone||'')}" required></div>
          <div class="field"><label>تاريخ الميلاد</label><input type="date" name="birth_date" value="${user.birth_date||''}" required></div>
        </div>
        <div class="field-row">
          <div class="field"><label>البريد الإلكتروني</label><input type="email" name="contact_email" value="${escapeHtml(user.contact_email||'')}"></div>
          <div class="field"><label>السنة الدراسية (الصف)</label>
            <select name="study_year" required>
              <option value="الصف الأول" ${user.study_year==='الصف الأول'?'selected':''}>الصف الأول</option>
              <option value="الصف الثاني" ${user.study_year==='الصف الثاني'?'selected':''}>الصف الثاني</option>
            </select>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-outline" id="close-modal">إلغاء</button>
          <button type="submit" class="btn-primary" id="save-modal" style="width:auto;">حفظ البيانات الجديدة</button>
        </div>
      </form>
    </div>
  </div>`;
  
  document.body.insertAdjacentHTML('beforeend', modalHTML);
  const modal = document.getElementById('edit-modal');
  
  document.getElementById('close-modal').addEventListener('click', () => modal.remove());
  
  document.getElementById('edit-student-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('save-modal');
    btn.disabled = true; btn.textContent = 'جاري الحفظ...';
    const fd = new FormData(e.target);
    
    const updates = {
      full_name: fd.get('full_name'),
      phone: fd.get('phone'),
      birth_date: fd.get('birth_date'),
      contact_email: fd.get('contact_email'),
      study_year: fd.get('study_year')
    };
    
    await supabase.from('users').update(updates).eq('id', user.id);
    modal.remove();
    onSaveComplete();
  });
}
